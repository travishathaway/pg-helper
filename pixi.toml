[workspace]
name = "pg-helper"
version = "0.1.0"
description = "Cross-platform PostgreSQL management CLI for pixi-based projects"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64"]
preview = ["pixi-build"]

[package]
name = "pg-helper"
version = "0.1.0"

[package.build]
backend = { name = "pixi-build-python", version = ">=0.1.0" }

[package.host-dependencies]
hatchling = ">=1.25.0"

[dependencies]
python = ">=3.10"
postgresql = ">=16"

[tasks]
pg-start = "pg-helper start"
pg-stop = "pg-helper stop"
pg-status = "pg-helper status"
pg-shell = "pg-helper shell"
pg-destroy = "pg-helper destroy"

